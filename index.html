<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🌊 魔法蓝藻 - 凝聚与律动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 50%, #80deea 100%);
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 加载界面 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 50%, #80deea 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        .loading-text {
            color: #0097a7;
            font-size: 1.3rem;
            margin-top: 20px;
            text-shadow: 0 0 8px rgba(0, 151, 167, 0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 开始按钮 */
        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 45px;
            font-size: 1.3rem;
            color: #fff;
            background: linear-gradient(135deg, #26c6da, #00bcd4);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 8px 25px rgba(0, 188, 212, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .start-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 188, 212, 0.6);
        }

        .start-btn:active {
            transform: translate(-50%, -50%) scale(0.98);
        }

        /* 右上角音乐控制 */
        .music-control {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 16px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(0, 188, 212, 0.2);
            opacity: 0;
            pointer-events: none;
        }

        .music-control.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .music-control:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
        }

        .music-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #26c6da, #00bcd4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #fff;
        }

        .music-info {
            color: #0097a7;
            font-size: 13px;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        /* 操作提示 */
        .tips {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 151, 167, 0.8);
            font-size: 13px;
            text-align: center;
            z-index: 999;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .tips.visible {
            opacity: 1;
        }

        .tips.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 粒子容器 */
        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div class="loading" id="loading">
        <div class="loading-text">🌊 正在唤醒魔法蓝藻...</div>
    </div>

    <!-- 开始按钮 -->
    <button class="start-btn" id="startBtn">✨ 开启梦幻之旅</button>

    <!-- 右上角音乐控制 -->
    <div class="music-control" id="musicControl">
        <div class="music-icon" id="musicIcon">⏸️</div>
        <div class="music-info" id="musicInfo">点击播放</div>
    </div>

    <!-- 操作提示 -->
    <div class="tips" id="tips">
        📱 手机：点击屏幕任意位置<br>
        💻 电脑：按任意键 或 点击鼠标<br>
        ✨ 轻点舒缓，快击灵动
    </div>

    <!-- 画布 -->
    <canvas id="canvas"></canvas>

    <script>
        // ========== 全局变量 ==========
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const startBtn = document.getElementById('startBtn');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        const musicInfo = document.getElementById('musicInfo');
        const tips = document.getElementById('tips');

        let width, height;
        let particles = [];
        let clickParticles = [];
        let isAnimationRunning = false;
        let time = 0;
        let animationId = null;

        // ========== 背景音乐配置 ==========
        const musicList = [
            {
                name: 'Lot to Learn - 柳轻颂',
                url: 'lot_to_learn.mp3'
            },
            {
                name: '星茶会 (钢琴版) - 兮沐',
                url: '星茶会.mp3'
            }
        ];

        let currentMusicIndex = 0;
        let isMusicPlaying = false;
        let bgAudio = null;
        let musicInitialized = false;

        // ========== 音乐功能 ==========
        function initBackgroundMusic() {
            if (musicInitialized) return;
            
            bgAudio = new Audio();
            bgAudio.volume = 0.6;
            bgAudio.loop = false;
            musicInitialized = true;

            loadMusic(currentMusicIndex);

            // 监听播放结束 -> 自动切歌
            bgAudio.addEventListener('ended', function onEnded() {
                console.log('🎵 歌曲播放结束，切换下一首');
                switchMusic();
            }, { once: false });

            // 监听加载错误
            bgAudio.addEventListener('error', function onError(e) {
                console.error('❌ 音乐加载失败:', e);
                musicInfo.textContent = '⚠️ 音乐加载失败';
                isMusicPlaying = false;
                updateMusicIcon();
            });
        }

        function loadMusic(index) {
            if (!bgAudio) return;
            
            const music = musicList[index];
            bgAudio.src = music.url;
            bgAudio.load();

            if (musicInfo) {
                musicInfo.textContent = music.name;
            }
            console.log('🔄 已加载:', music.name);
        }

        function switchMusic() {
            currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
            isMusicPlaying = true;
            loadMusic(currentMusicIndex);

            if (bgAudio) {
                bgAudio.play().then(() => {
                    console.log('▶️ 自动播放成功');
                    updateMusicIcon();
                }).catch(error => {
                    console.error('⚠️ 自动播放失败:', error);
                    isMusicPlaying = false;
                    updateMusicIcon();
                });
            }
        }

        function toggleMusic() {
            if (!bgAudio) {
                initBackgroundMusic();
            }

            if (!bgAudio.src) {
                loadMusic(currentMusicIndex);
            }

            if (isMusicPlaying) {
                bgAudio.pause();
                isMusicPlaying = false;
                console.log('️ 已暂停');
            } else {
                bgAudio.play().then(() => {
                    isMusicPlaying = true;
                    console.log('▶️ 已播放');
                }).catch(error => {
                    console.error('❌ 播放失败:', error);
                });
            }

            updateMusicIcon();
        }

        function updateMusicIcon() {
            if (musicIcon) {
                musicIcon.textContent = isMusicPlaying ? '️' : '▶️';
            }
        }

        // ========== 画布设置 ==========
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        // ========== 粒子类（优化版） ==========
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.hue = 180 + Math.random() * 40;
                this.saturation = 70 + Math.random() * 30;
                this.lightness = 60 + Math.random() * 20;
                this.alpha = 0.4 + Math.random() * 0.4;
                this.pulseSpeed = 0.01 + Math.random() * 0.015;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;

                this.pulse = Math.sin(time * this.pulseSpeed + this.pulseOffset);
            }

            draw() {
                const currentSize = this.size + this.pulse * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.3, currentSize), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.alpha})`;
                ctx.fill();
            }
        }

        // ========== 点击粒子效果 ==========
        class ClickParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speed = Math.random() * 2 + 1.5;
                this.angle = Math.random() * Math.PI * 2;
                this.hue = 180 + Math.random() * 40;
                this.alpha = 1;
                this.decay = 0.02 + Math.random() * 0.015;
                this.gravity = 0.03;
                this.velocityX = Math.cos(this.angle) * this.speed;
                this.velocityY = Math.sin(this.angle) * this.speed;
            }

            update() {
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.velocityY += this.gravity;
                this.alpha -= this.decay;
                this.size *= 0.97;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.3, this.size), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0 || this.size <= 0.3;
            }
        }

        // ========== 初始化粒子 ==========
        function initParticles() {
            particles = [];
            const particleCount = Math.min(80, Math.floor((width * height) / 15000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // ========== 动画循环（优化版） ==========
        function animate() {
            if (!isAnimationRunning) return;

            ctx.clearRect(0, 0, width, height);

            time++;

            // 更新和绘制背景粒子
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // 更新和绘制点击粒子
            for (let i = clickParticles.length - 1; i >= 0; i--) {
                clickParticles[i].update();
                clickParticles[i].draw();
                if (clickParticles[i].isDead()) {
                    clickParticles.splice(i, 1);
                }
            }

            // 绘制连接线（优化：只连接附近的粒子）
            drawConnections();

            animationId = requestAnimationFrame(animate);
        }

        // ========== 绘制粒子连线 ==========
        function drawConnections() {
            const maxDistance = 100;
            ctx.lineWidth = 0.3;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        const alpha = (1 - distance / maxDistance) * 0.2;
                        ctx.strokeStyle = `rgba(0, 188, 212, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // ========== 创建点击粒子 ==========
        function createClickParticles(x, y) {
            const count = 12;
            for (let i = 0; i < count; i++) {
                clickParticles.push(new ClickParticle(x, y));
            }
        }

        // ========== 事件监听 ==========
        function handleInteraction(x, y) {
            if (!isAnimationRunning) return;
            createClickParticles(x, y);
        }

        // 鼠标点击
        canvas.addEventListener('click', function(e) {
            handleInteraction(e.clientX, e.clientY);
        });

        // 触摸事件
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                handleInteraction(e.touches[i].clientX, e.touches[i].clientY);
            }
        }, { passive: false });

        // 键盘事件
        document.addEventListener('keydown', function(e) {
            if (!isAnimationRunning) return;
            const x = Math.random() * width;
            const y = Math.random() * height;
            createClickParticles(x, y);
        });

        // 窗口大小变化
        window.addEventListener('resize', function() {
            resizeCanvas();
            initParticles();
        });

        // 音乐控制点击
        musicControl.addEventListener('click', function(e) {
            e.stopPropagation();
            toggleMusic();
        });

        // ========== 开始按钮点击 ==========
        startBtn.addEventListener('click', function() {
            console.log('🚀 开始按钮被点击');
            
            // 初始化背景音乐
            initBackgroundMusic();

            // 设置初始音乐信息
            if (musicInfo) {
                musicInfo.textContent = musicList[0].name;
            }

            // 开始播放音乐
            toggleMusic();

            // 隐藏加载界面
            loading.classList.add('hidden');
            
            // 显示开始按钮（添加可见类）
            startBtn.classList.add('visible');

            // 显示音乐控制和提示
            setTimeout(() => {
                musicControl.classList.add('visible');
                tips.classList.add('visible');
            }, 300);

            // 开始动画
            isAnimationRunning = true;
            animate();

            // 3 秒后隐藏提示
            setTimeout(() => {
                tips.classList.add('hidden');
            }, 5000);

            // 隐藏开始按钮（点击后）
            setTimeout(() => {
                startBtn.classList.remove('visible');
                startBtn.style.pointerEvents = 'none';
            }, 500);
        });

        // ========== 页面加载完成后显示开始按钮 ==========
        window.addEventListener('load', function() {
            console.log('📄 页面加载完成');
            
            // 确保画布尺寸正确
            resizeCanvas();
            
            // 初始化粒子
            initParticles();

            // 1.5 秒后显示开始按钮
            setTimeout(() => {
                startBtn.classList.add('visible');
                console.log('✨ 开始按钮已显示');
            }, 1500);
        });

        // 预加载检查
        console.log('🎵 页面初始化完成，等待用户交互');
    </script>
</body>
</html>
