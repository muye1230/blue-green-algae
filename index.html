<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌊 魔法蓝藻 - 凝聚与律动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Arial', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 加载界面 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: #00d9ff;
            font-size: 1.5rem;
            margin-top: 20px;
            text-shadow: 0 0 10px #00d9ff;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 开始按钮 */
        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 50px;
            font-size: 1.5rem;
            color: #fff;
            background: linear-gradient(135deg, #00d9ff, #0099ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 50px rgba(0, 217, 255, 0.8);
        }

        .start-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 右上角音乐控制 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 217, 255, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            background: rgba(0, 217, 255, 0.4);
        }

        .music-icon {
            width: 30px;
            height: 30px;
            background: #00d9ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
        }

        .music-info {
            color: #00d9ff;
            font-size: 14px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 操作提示 */
        .tips {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            z-index: 999;
            line-height: 1.8;
        }

        .tips.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div class="loading" id="loading">
        <div class="loading-text">正在唤醒魔法蓝藻...🌊</div>
    </div>

    <!-- 开始按钮 -->
    <button class="start-btn" id="startBtn">🌊 开启梦幻之旅</button>

    <!-- 右上角音乐控制 -->
    <div class="music-control" id="musicControl">
        <div class="music-icon" id="musicIcon">⏸️</div>
        <div class="music-info" id="musicInfo">点击播放</div>
    </div>

    <!-- 操作提示 -->
    <div class="tips" id="tips">
        📱 手机：点击屏幕任意位置<br>
        💻 电脑：按任意键 或 点击鼠标<br>
        ✨ 轻点舒缓，快击灵动
    </div>

    <!-- 画布 -->
    <canvas id="canvas"></canvas>

    <script>
        // ========== 全局变量 ==========
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const startBtn = document.getElementById('startBtn');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        const musicInfo = document.getElementById('musicInfo');
        const tips = document.getElementById('tips');

        let width, height;
        let particles = [];
        let isAnimationRunning = false;
        let audioContext = null;

        // ========== 背景音乐配置 ==========
        const musicList = [
            {
                name: 'Lot to Learn - 柳轻颂',
                url: 'lot_to_learn.mp3'
            },
            {
                name: '星茶会 (钢琴版) - 兮沐',
                url: '星茶会.mp3'
            }
        ];

        let currentMusicIndex = 0;
        let isMusicPlaying = false;
        let bgAudio = new Audio();
        bgAudio.volume = 0.6;

        // ========== 音乐功能 ==========
        function initBackgroundMusic() {
            loadMusic(currentMusicIndex);

            // 监听播放结束 -> 自动切歌
            bgAudio.addEventListener('ended', () => {
                console.log('🎵 歌曲播放结束，准备切换下一首...');
                switchMusic();
            });

            // 监听加载错误
            bgAudio.addEventListener('error', (e) => {
                console.error('❌ 音乐加载失败:', e);
                musicInfo.textContent = '⚠️ 音乐加载失败';
                isMusicPlaying = false;
                updateMusicIcon();
            });

            // 监听可以播放
            bgAudio.addEventListener('canplay', () => {
                console.log('✅ 音乐已就绪:', musicList[currentMusicIndex].name);
            });
        }

        function loadMusic(index) {
            const music = musicList[index];
            bgAudio.src = music.url;
            bgAudio.load();

            if (musicInfo) {
                musicInfo.textContent = music.name;
            }
            console.log('🔄 已加载音乐:', music.name);
        }

        function switchMusic() {
            currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
            isMusicPlaying = true;
            loadMusic(currentMusicIndex);

            const playPromise = bgAudio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log('▶️ 下一首自动播放成功');
                    updateMusicIcon();
                }).catch(error => {
                    console.error('⚠️ 自动播放失败:', error);
                    isMusicPlaying = false;
                    updateMusicIcon();
                });
            }
        }

        function toggleMusic() {
            if (!bgAudio.src) {
                loadMusic(currentMusicIndex);
            }

            if (isMusicPlaying) {
                bgAudio.pause();
                isMusicPlaying = false;
                console.log('⏸️ 音乐已暂停');
            } else {
                const playPromise = bgAudio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isMusicPlaying = true;
                        console.log('▶️ 音乐已播放');
                    }).catch(error => {
                        console.error('❌ 播放失败:', error);
                    });
                }
            }

            updateMusicIcon();
        }

        function updateMusicIcon() {
            if (isMusicPlaying) {
                musicIcon.textContent = '⏸️';
            } else {
                musicIcon.textContent = '▶️';
            }
        }

        // ========== 音频可视化 ==========
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;

                // 注意：这里不直接连接 bgAudio，因为 CORS 问题
                // 我们使用模拟数据来驱动视觉效果
                window.analyser = analyser;
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // ========== 画布设置 ==========
        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // ========== 粒子类 ==========
        class Particle {
            constructor(x, y, isClick = false) {
                this.x = x;
                this.y = y;
                this.isClick = isClick;
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.hue = Math.random() * 60 + 180; // 蓝绿色系
                this.saturation = Math.random() * 50 + 50;
                this.lightness = Math.random() * 30 + 50;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.x += this.speedX;
                this.y += this.speedY;

                // 边界反弹
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;

                // 脉冲效果
                this.pulse = Math.sin(time * this.pulseSpeed + this.pulseOffset);
            }

            draw() {
                const currentSize = this.size + this.pulse * 0.5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.5, currentSize), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.alpha})`;
                ctx.fill();
            }
        }

        // ========== 点击粒子效果 ==========
        class ClickParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 3;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.hue = Math.random() * 60 + 180;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
                this.gravity = 0.05;
                this.velocityX = Math.cos(this.angle) * this.speed;
                this.velocityY = Math.sin(this.angle) * this.speed;
            }

            update() {
                this.x += this.velocityX;
                this.y += this.velocityY;
                this.velocityY += this.gravity;
                this.alpha -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(0.5, this.size), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0 || this.size <= 0.5;
            }
        }

        // ========== 初始化粒子 ==========
        function initParticles() {
            particles = [];
            const particleCount = Math.min(150, Math.floor((width * height) / 10000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // ========== 动画循环 ==========
        let clickParticles = [];
        let time = 0;

        function animate() {
            if (!isAnimationRunning) return;

            ctx.fillStyle = 'rgba(15, 12, 41, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time++;

            // 更新和绘制背景粒子
            particles.forEach(particle => {
                particle.update(time);
                particle.draw();
            });

            // 更新和绘制点击粒子
            clickParticles = clickParticles.filter(p => !p.isDead());
            clickParticles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 绘制连接线
            drawConnections();

            requestAnimationFrame(animate);
        }

        // ========== 绘制粒子连线 ==========
        function drawConnections() {
            const maxDistance = 120;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        const alpha = (1 - distance / maxDistance) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 217, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        // ========== 创建点击粒子 ==========
        function createClickParticles(x, y) {
            const count = 15;
            for (let i = 0; i < count; i++) {
                clickParticles.push(new ClickParticle(x, y));
            }
        }

        // ========== 事件监听 ==========
        function handleInteraction(x, y) {
            if (!isAnimationRunning) return;
            createClickParticles(x, y);
        }

        // 鼠标点击
        canvas.addEventListener('click', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        // 鼠标移动（轻微效果）
        canvas.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.9) {
                createClickParticles(e.clientX, e.clientY);
            }
        });

        // 触摸事件
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                handleInteraction(e.touches[i].clientX, e.touches[i].clientY);
            }
        }, { passive: false });

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (!isAnimationRunning) return;
            const x = Math.random() * width;
            const y = Math.random() * height;
            createClickParticles(x, y);
        });

        // 窗口大小变化
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        // ========== 音乐控制点击 ==========
        musicControl.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });

        // ========== 开始按钮点击 ==========
        startBtn.addEventListener('click', () => {
            // 初始化音频上下文
            initAudioContext();

            // 初始化背景音乐
            initBackgroundMusic();

            // 设置初始音乐信息
            musicInfo.textContent = musicList[0].name;

            // 开始播放音乐
            toggleMusic();

            // 隐藏加载界面和开始按钮
            loading.classList.add('hidden');
            startBtn.classList.add('hidden');

            // 开始动画
            isAnimationRunning = true;
            animate();

            // 3 秒后隐藏提示
            setTimeout(() => {
                tips.classList.add('hidden');
            }, 3000);
        });

        // ========== 初始化 ==========
        resizeCanvas();
        initParticles();

        // 预加载音乐（可选）
        console.log('🎵 页面已加载，点击开始按钮启动体验');
    </script>
</body>
</html>
