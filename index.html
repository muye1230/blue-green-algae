<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="wechat-enable-web-view-scroll" content="false">
    <title>🌊 魔法蓝藻 - 凝聚与律动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            background: linear-gradient(180deg, #0a1628 0%, #1a2840 40%, #2a3850 70%, #1a2840 100%);
            touch-action: none;
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* 光晕层 - 保持微弱环境光 */
        .glow-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 80%, rgba(0, 150, 200, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 50;
        }

        /* 音乐控制面板 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 198, 255, 0.4);
        }

        .music-btn:active {
            transform: scale(0.9);
        }

        .music-btn.playing {
            animation: pulse-music 1.5s ease-in-out infinite;
        }

        @keyframes pulse-music {
            0%, 100% { box-shadow: 0 4px 10px rgba(0, 198, 255, 0.4); }
            50% { box-shadow: 0 4px 20px rgba(0, 198, 255, 0.8); }
        }

        .music-info {
            color: rgba(200, 230, 255, 0.8);
            font-size: 12px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 230, 255, 0.7);
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 15px rgba(0, 200, 255, 0.8);
            animation: hint-fade 4s ease-in-out forwards;
            padding: 0 20px;
            line-height: 1.8;
        }

        @keyframes hint-fade {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        .wechat-hint {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 200, 255, 0.15);
            padding: 5px 12px;
            border-radius: 15px;
            color: rgba(200, 230, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }

        /* 底部光效 */
        .bottom-lights {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: radial-gradient(ellipse at 50% 100%, rgba(0, 200, 255, 0.2) 0%, transparent 70%);
            pointer-events: none;
            z-index: 40;
        }

        /* 加载提示 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0a1628 0%, #1a2840 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: rgba(200, 230, 255, 0.9);
            font-size: 18px;
            margin-top: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 200, 255, 0.2);
            border-top-color: #00c6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 开始按钮 */
        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 45px;
            font-size: 18px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            border: none;
            border-radius: 35px;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 198, 255, 0.5);
            transition: all 0.3s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            letter-spacing: 2px;
        }

        .start-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .start-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 加载页面 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在唤醒魔法蓝藻...</div>
    </div>

    <!-- 开始按钮 -->
    <button class="start-btn" id="startBtn">🌊 开启梦幻之旅</button>

    <canvas id="canvas"></canvas>
    
    <!-- 光晕层 -->
    <div class="glow-layer"></div>
    
    <!-- 底部光效 -->
    <div class="bottom-lights"></div>
    
    <!-- 微信提示 -->
    <div class="wechat-hint" id="wechatHint"></div>
    
    <!-- 音乐控制 -->
    <div class="music-control">
        <button class="music-btn" id="musicBtn">🎵</button>
        <div class="music-info" id="musicInfo">点击播放</div>
    </div>
    
    <!-- 提示文字 -->
    <div class="hint" id="hint">
        📱 手机：点击屏幕任意位置<br>
        💻 电脑：按任意键 或 点击鼠标<br>
        ✨ 轻点舒缓，快击灵动
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        const wechatHint = document.getElementById('wechatHint');
        const loading = document.getElementById('loading');
        const startBtn = document.getElementById('startBtn');
        const musicBtn = document.getElementById('musicBtn');
        const musicInfo = document.getElementById('musicInfo');

        // 检测微信浏览器
        function isWeChat() {
            return /micromessenger/i.test(navigator.userAgent);
        }

        if (isWeChat()) {
            wechatHint.textContent = '🌊 微信中打开';
        }

        // 设置画布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 防止微信下拉刷新
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // ========== 交互频率监测器 (核心逻辑) ==========
        const clickTracker = {
            clicks: [],
            threshold: 500, // 毫秒：在此时间内多次点击视为高频
            
            registerClick: function() {
                const now = Date.now();
                // 移除超过阈值的旧点击记录
                this.clicks = this.clicks.filter(time => now - time < this.threshold);
                this.clicks.push(now);
                
                // 如果短时间内点击次数 > 2次，返回 true (高频模式)
                return this.clicks.length > 2;
            },
            
            getIntensity: function() {
                // 根据点击密度返回加速系数 (1.0 - 3.0)
                const count = this.clicks.length;
                if (count <= 2) return 1.0;
                if (count <= 5) return 1.8;
                return 2.5;
            }
        };

        // ========== 蓝藻粒子类 ==========
        class AlgaeParticle {
            constructor(x, y, clusterId, isFastMode) {
                this.x = x;
                this.y = y;
                this.clusterId = clusterId;
                
                // 蓝藻颜色
                const colors = [
                    { r: 0, g: 200, b: 255 },
                    { r: 0, g: 180, b: 230 },
                    { r: 50, g: 220, b: 255 },
                    { r: 100, g: 240, b: 255 },
                    { r: 0, g: 150, b: 200 },
                    { r: 80, g: 200, b: 240 }
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // 粒子大小
                this.size = 2.5 + Math.random() * 4;
                this.baseSize = this.size;
                
                // 运动参数
                this.velocityY = -2.5 - Math.random() * 2.5; 
                this.velocityX = (Math.random() - 0.5) * 1.5;
                
                // 向心力参数 (增强集聚性)
                this.centerPull = 0.02 + Math.random() * 0.03; 
                this.clusterCenterX = x; // 记录生成时的中心点
                
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.03 + Math.random() * 0.03;
                this.wobbleAmount = 0.3 + Math.random() * 0.8;
                
                // 透明度与消失 - 动态调整
                this.alpha = 0.95;
                const baseDecay = 0.004 + Math.random() * 0.003;
                // 如果是高频模式，消失速度加快
                this.decay = baseDecay * (isFastMode ? 2.5 : 1.0); 
                this.life = 1;
                
                // 拖尾效果 - 缩短长度
                this.trail = [];
                this.maxTrailLength = isFastMode ? 6 : 12; // 高频时更短，普通时也缩短了
                
                // 形状变化
                this.shapeType = Math.floor(Math.random() * 5);
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.06;
                
                // 发光
                this.glow = 6 + Math.random() * 8;
            }

            draw() {
                // 绘制拖尾 (更短促)
                if (this.trail.length > 2) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        const point = this.trail[i];
                        // 拖尾透明度衰减更快
                        const trailAlpha = (i / this.trail.length) * this.alpha * 0.3;
                        ctx.lineTo(point.x, point.y);
                    }
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.3})`;
                    ctx.lineWidth = this.size * 0.4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.stroke();
                    ctx.restore();
                }

                // 绘制主体
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const drawAlpha = this.alpha;
                
                if (this.shapeType === 0) {
                    // 圆形
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${drawAlpha})`;
                    ctx.shadowBlur = this.glow;
                    ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${drawAlpha})`;
                    ctx.fill();
                } else if (this.shapeType === 1) {
                    // 星形
                    this.drawStar(0, 0, 5, this.size, this.size * 0.5, drawAlpha);
                } else if (this.shapeType === 2) {
                    // 三角形
                    this.drawPolygon(0, 0, 3, this.size * 1.2, drawAlpha);
                } else if (this.shapeType === 3) {
                    // 方形
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${drawAlpha})`;
                    ctx.shadowBlur = this.glow;
                    ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${drawAlpha})`;
                    ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
                } else {
                    // 不规则
                    this.drawIrregular(0, 0, this.size, drawAlpha);
                }
                
                ctx.restore();
            }

            drawStar(cx, cy, spikes, outerRadius, innerRadius, alpha) {
                let rot = Math.PI / 2 * 3;
                let step = Math.PI / spikes;
                ctx.beginPath();
                ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    let x = cx + Math.cos(rot) * outerRadius;
                    let y = cy + Math.sin(rot) * outerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                    x = cx + Math.cos(rot) * innerRadius;
                    y = cy + Math.sin(rot) * innerRadius;
                    ctx.lineTo(x, y);
                    rot += step;
                }
                ctx.closePath();
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }

            drawPolygon(cx, cy, sides, radius, alpha) {
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i * 2 * Math.PI / sides) - Math.PI / 2;
                    const x = cx + radius * Math.cos(angle);
                    const y = cy + radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }

            drawIrregular(cx, cy, size, alpha) {
                ctx.beginPath();
                const points = 5 + Math.floor(Math.random() * 3);
                for (let i = 0; i < points; i++) {
                    const angle = (i * 2 * Math.PI / points);
                    const radius = size * (0.8 + Math.random() * 0.4);
                    const x = cx + radius * Math.cos(angle);
                    const y = cy + radius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }

            update() {
                // 记录拖尾
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrailLength) {
                    this.trail.shift();
                }

                // 向上浮动
                this.y += this.velocityY;
                
                // 左右摆动
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount * 0.4 + this.velocityX * 0.2;
                
                // 【关键】向心力逻辑：让粒子稍微向生成中心靠拢，增加紧密感
                const dx = this.clusterCenterX - this.x;
                this.x += dx * this.centerPull;

                // 旋转
                this.rotation += this.rotationSpeed;

                // 逐渐消失
                this.alpha -= this.decay;
                this.life -= this.decay;
                
                // 尺寸变小
                this.size = Math.max(0.8, this.baseSize * (this.life));
            }

            isDead() {
                return this.alpha <= 0 || this.y < -100;
            }
        }

        // ========== 背景浮动粒子 ==========
        class BackgroundParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * window.innerHeight;
            }
            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = window.innerHeight + 50;
                this.size = 1 + Math.random() * 2;
                this.velocityY = -0.1 - Math.random() * 0.2;
                this.alpha = 0.1 + Math.random() * 0.2;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.01;
            }
            draw() {
                ctx.save();
                ctx.fillStyle = `rgba(100, 200, 255, ${this.alpha})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.velocityY;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.2;
                if (this.y < -50) this.reset();
            }
        }

        // 存储对象
        let algaeParticles = [];
        let bgParticles = [];
        let particleIdCounter = 0;

        function initBackgroundParticles() {
            for (let i = 0; i < 20; i++) {
                bgParticles.push(new BackgroundParticle());
            }
        }

        // 创建蓝藻群
        function createAlgaeBurst(x, y) {
            // 检查点击频率
            const isFastMode = clickTracker.registerClick();
            const intensity = clickTracker.getIntensity();
            
            const clusterId = particleIdCounter++;
            // 粒子数量适中
            const particleCount = 12 + Math.floor(Math.random() * 15);
            
            // 【关键】缩小生成范围，增强紧密度
            // 之前是 100x60，现在改为 40x25
            const spreadX = 20; 
            const spreadY = 12;

            for (let i = 0; i < particleCount; i++) {
                const offsetX = (Math.random() - 0.5) * spreadX * 2;
                const offsetY = (Math.random() - 0.5) * spreadY * 2;
                algaeParticles.push(new AlgaeParticle(x + offsetX, y + offsetY, clusterId, isFastMode));
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio);

            bgParticles.forEach(p => { p.update(); p.draw(); });

            for (let i = algaeParticles.length - 1; i >= 0; i--) {
                algaeParticles[i].update();
                algaeParticles[i].draw();
                if (algaeParticles[i].isDead()) {
                    algaeParticles.splice(i, 1);
                }
            }
        }

        // ========== 钢琴音效 ==========
        const pianoNotes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25];
        let audioContext = null;
        let isMusicPlaying = false;
        let pianoVolume = 0.12; // 基础音量稍调低，避免干扰

        function initAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playPianoNote() {
            if (!audioContext) return;
            const note = pianoNotes[Math.floor(Math.random() * pianoNotes.length)];
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(note, audioContext.currentTime);
            
            // 动态音量：音乐暂停时自动变大
            const currentVol = isMusicPlaying ? pianoVolume : pianoVolume * 2.5;
            gainNode.gain.setValueAtTime(currentVol, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.8);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 1.8);
        }

        // ========== 背景音乐 ==========
        const musicList = [
            { name: 'Lot to Learn - 柳轻颂', url: 'https://cdn.jsdelivr.net/gh/muye1230/blue-green algae@main/Lot to Learn.mp3' },
            { name: '星茶会 (钢琴版) - 兮沐', url: 'https://cdn.jsdelivr.net/gh/muye1230/blue-green algae@main/星茶会(钢琴版).mp3' }
        ];
        let currentMusicIndex = 0;
        let bgAudio = new Audio();
        bgAudio.loop = false;
        bgAudio.volume = 0.6;

        function initBackgroundMusic() {
            bgAudio.src = musicList[currentMusicIndex].url;
            bgAudio.addEventListener('ended', () => {
                currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
                bgAudio.src = musicList[currentMusicIndex].url;
                if (isMusicPlaying) bgAudio.play().catch(e => console.log(e));
            });
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                bgAudio.pause();
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('playing');
                isMusicPlaying = false;
            } else {
                bgAudio.play().then(() => {
                    musicBtn.textContent = '⏸️';
                    musicBtn.classList.add('playing');
                    isMusicPlaying = true;
                }).catch(e => console.log(e));
            }
        }

        musicBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMusic(); });
        function updateMusicInfo() { musicInfo.textContent = musicList[currentMusicIndex].name; }

        // ========== 事件处理 ==========
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudioContext();
            for (let touch of e.touches) {
                createAlgaeBurst(touch.clientX, touch.clientY);
                playPianoNote();
            }
        }, { passive: false });

        canvas.addEventListener('click', (e) => {
            initAudioContext();
            createAlgaeBurst(e.clientX, e.clientY);
            playPianoNote();
        });

        document.addEventListener('keydown', (e) => {
            initAudioContext();
            createAlgaeBurst(window.innerWidth * 0.5, window.innerHeight * 0.7);
            playPianoNote();
        });

        canvas.addEventListener('mousedown', (e) => {
            initAudioContext();
            createAlgaeBurst(e.clientX, e.clientY);
            playPianoNote();
        });

        // ========== 初始化 ==========
        startBtn.addEventListener('click', () => {
            initAudioContext();
            initBackgroundMusic();
            updateMusicInfo();
            initBackgroundParticles();
            
            loading.classList.add('hidden');
            startBtn.classList.add('hidden');
            toggleMusic();
            animate();
            
            setTimeout(() => {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        createAlgaeBurst(window.innerWidth * 0.5, window.innerHeight * 0.8);
                    }, i * 400);
                }
            }, 500);
        });

        window.addEventListener('load', () => {
            setTimeout(() => loading.classList.add('hidden'), 1000);
        });

        // 性能限制
        const MAX_PARTICLES = 350;
        setInterval(() => {
            if (algaeParticles.length > MAX_PARTICLES) {
                algaeParticles.splice(0, algaeParticles.length - MAX_PARTICLES);
            }
        }, 500);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isMusicPlaying) bgAudio.pause();
            else if (isMusicPlaying) bgAudio.play().catch(e => console.log(e));
        });
    </script>
</body>
</html>
