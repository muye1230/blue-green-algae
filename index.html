<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="wechat-enable-web-view-scroll" content="false">
    <title>🌊 魔法蓝藻 - 梦幻浮动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            background: linear-gradient(180deg, #0a1628 0%, #1a2840 40%, #2a3850 70%, #1a2840 100%);
            touch-action: none;
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(1px) contrast(1.1);
        }

        /* 光晕层 */
        .glow-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 80%, rgba(0, 150, 200, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 50;
        }

        /* 音乐控制面板 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 198, 255, 0.4);
        }

        .music-btn:active {
            transform: scale(0.9);
        }

        .music-btn.playing {
            animation: pulse-music 1.5s ease-in-out infinite;
        }

        @keyframes pulse-music {
            0%, 100% { box-shadow: 0 4px 10px rgba(0, 198, 255, 0.4); }
            50% { box-shadow: 0 4px 20px rgba(0, 198, 255, 0.8); }
        }

        .music-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 提示文字 */
        .hint {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 230, 255, 0.7);
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 15px rgba(0, 200, 255, 0.8);
            animation: hint-fade 4s ease-in-out forwards;
            padding: 0 20px;
            line-height: 1.8;
        }

        @keyframes hint-fade {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        .wechat-hint {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 200, 255, 0.15);
            padding: 5px 12px;
            border-radius: 15px;
            color: rgba(200, 230, 255, 0.7);
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }

        /* 装饰元素 - 底部光点 */
        .bottom-lights {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: radial-gradient(ellipse at 50% 100%, rgba(0, 200, 255, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 40;
        }

        /* 加载提示 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #0a1628 0%, #1a2840 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            color: rgba(200, 230, 255, 0.9);
            font-size: 18px;
            margin-top: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 200, 255, 0.2);
            border-top-color: #00c6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 开始按钮 */
        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 45px;
            font-size: 18px;
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            color: white;
            border: none;
            border-radius: 35px;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 198, 255, 0.5);
            transition: all 0.3s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            letter-spacing: 2px;
        }

        .start-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .start-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 浮动粒子背景 */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 30;
        }
    </style>
</head>
<body>
    <!-- 加载页面 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在唤醒魔法蓝藻...</div>
    </div>

    <!-- 开始按钮 -->
    <button class="start-btn" id="startBtn">🌊 开启梦幻之旅</button>

    <canvas id="canvas"></canvas>
    
    <!-- 光晕层 -->
    <div class="glow-layer"></div>
    
    <!-- 底部光效 -->
    <div class="bottom-lights"></div>
    
    <!-- 微信提示 -->
    <div class="wechat-hint" id="wechatHint"></div>
    
    <!-- 音乐控制 -->
    <div class="music-control">
        <button class="music-btn" id="musicBtn">🎵</button>
        <div class="music-info" id="musicInfo">点击播放</div>
    </div>
    
    <!-- 提示文字 -->
    <div class="hint" id="hint">
        📱 手机：点击屏幕任意位置<br>
        💻 电脑：按任意键 或 点击鼠标<br>
        ✨ 聆听钢琴，观赏蓝藻
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hint = document.getElementById('hint');
        const wechatHint = document.getElementById('wechatHint');
        const loading = document.getElementById('loading');
        const startBtn = document.getElementById('startBtn');
        const musicBtn = document.getElementById('musicBtn');
        const musicInfo = document.getElementById('musicInfo');

        // 检测微信浏览器
        function isWeChat() {
            return /micromessenger/i.test(navigator.userAgent);
        }

        if (isWeChat()) {
            wechatHint.textContent = '🌊 微信中打开';
        }

        // 设置画布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 防止微信下拉刷新
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // ========== 蓝藻团块类（群体效果） ==========
        class AlgaeCluster {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.velocityY = -1.5 - Math.random() * 2;
                this.velocityX = (Math.random() - 0.5) * 1.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.03 + Math.random() * 0.02;
                this.wobbleAmount = 1 + Math.random() * 2;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.01; // 加快消失速度
                this.life = 1;
                
                // 创建团块内的多个粒子（群体性）
                const particleCount = 8 + Math.floor(Math.random() * 12);
                for (let i = 0; i < particleCount; i++) {
                    this.particles.push({
                        offsetX: (Math.random() - 0.5) * 50,
                        offsetY: (Math.random() - 0.5) * 50,
                        size: 3 + Math.random() * 8,
                        alpha: 0.6 + Math.random() * 0.4,
                        color: this.getRandomBlueColor()
                    });
                }
            }

            getRandomBlueColor() {
                const colors = [
                    { r: 0, g: 200, b: 255 },
                    { r: 0, g: 180, b: 230 },
                    { r: 50, g: 220, b: 255 },
                    { r: 100, g: 240, b: 255 },
                    { r: 0, g: 150, b: 200 },
                    { r: 80, g: 200, b: 240 }
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            draw() {
                // 绘制团块（模糊群体效果）
                ctx.save();
                
                // 外层光晕
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, 60
                );
                gradient.addColorStop(0, `rgba(0, 200, 255, ${this.alpha * 0.3})`);
                gradient.addColorStop(0.5, `rgba(0, 150, 200, ${this.alpha * 0.15})`);
                gradient.addColorStop(1, 'rgba(0, 100, 150, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 60, 0, Math.PI * 2);
                ctx.fill();

                // 绘制团块内的各个粒子
                this.particles.forEach(p => {
                    const px = this.x + p.offsetX + Math.sin(this.wobble) * this.wobbleAmount;
                    const py = this.y + p.offsetY;
                    
                    const particleGradient = ctx.createRadialGradient(
                        px, py, 0,
                        px, py, p.size * 2
                    );
                    particleGradient.addColorStop(0, `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha * this.alpha})`);
                    particleGradient.addColorStop(0.5, `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha * this.alpha * 0.5})`);
                    particleGradient.addColorStop(1, `rgba(${p.r}, ${p.g}, ${p.b}, 0)`);
                    
                    ctx.fillStyle = particleGradient;
                    ctx.beginPath();
                    ctx.arc(px, py, p.size * 2, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.restore();
            }

            update() {
                this.y += this.velocityY;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount * 0.3 + this.velocityX * 0.3;
                this.alpha -= this.decay;
                this.life -= this.decay;
                
                // 粒子轻微扩散
                this.particles.forEach(p => {
                    p.offsetY -= 0.3;
                    p.offsetX += (Math.random() - 0.5) * 0.5;
                });
            }

            isDead() {
                return this.alpha <= 0 || this.y < -100;
            }
        }

        // ========== 背景浮动粒子 ==========
        class BackgroundParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * window.innerHeight;
            }

            reset() {
                this.x = Math.random() * window.innerWidth;
                this.y = window.innerHeight + 50;
                this.size = 1 + Math.random() * 3;
                this.velocityY = -0.2 - Math.random() * 0.3;
                this.alpha = 0.2 + Math.random() * 0.3;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.01 + Math.random() * 0.02;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = `rgba(100, 200, 255, ${this.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.y += this.velocityY;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.3;
                
                if (this.y < -50) {
                    this.reset();
                }
            }
        }

        // 存储所有对象
        let algaeClusters = [];
        let bgParticles = [];

        // 初始化背景粒子
        function initBackgroundParticles() {
            for (let i = 0; i < 30; i++) {
                bgParticles.push(new BackgroundParticle());
            }
        }

        // 创建蓝藻团块
        function createAlgaeCluster(x, y) {
            const clusterCount = 1 + Math.floor(Math.random() * 2);
            for (let i = 0; i < clusterCount; i++) {
                const offsetX = (Math.random() - 0.5) * 80;
                const offsetY = (Math.random() - 0.5) * 40;
                algaeClusters.push(new AlgaeCluster(x + offsetX, y + offsetY));
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 清除画布
            ctx.clearRect(0, 0, canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio);

            // 绘制背景粒子
            bgParticles.forEach(p => {
                p.update();
                p.draw();
            });

            // 更新和绘制蓝藻团块
            for (let i = algaeClusters.length - 1; i >= 0; i--) {
                algaeClusters[i].update();
                algaeClusters[i].draw();
                
                if (algaeClusters[i].isDead()) {
                    algaeClusters.splice(i, 1);
                }
            }
        }

        // ========== 钢琴音效 ==========
        const pianoNotes = [
            261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25,
            261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25
        ];

        let audioContext = null;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPianoNote() {
            if (!audioContext) return;
            
            const note = pianoNotes[Math.floor(Math.random() * pianoNotes.length)];
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(note, audioContext.currentTime);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 1.5);
        }

        // ========== 背景音乐 ==========
        const musicList = [
            {
                name: 'Lot to Learn - 柳轻颂',
                url: 'https://music.163.com/song/media/outer/url?id=1860163033.mp3'
            },
            {
                name: '星茶会 (钢琴版) - 兮沐',
                url: 'https://music.163.com/song/media/outer/url?id=1457701294.mp3'
            }
        ];

        let currentMusicIndex = 0;
        let isPlaying = false;
        let bgAudio = new Audio();
        bgAudio.loop = false;
        bgAudio.volume = 0.4;

        function initBackgroundMusic() {
            bgAudio.src = musicList[currentMusicIndex].url;
            
            bgAudio.addEventListener('ended', () => {
                currentMusicIndex = (currentMusicIndex + 1) % musicList.length;
                bgAudio.src = musicList[currentMusicIndex].url;
                if (isPlaying) {
                    bgAudio.play().catch(e => console.log('播放失败:', e));
                }
            });

            bgAudio.addEventListener('error', (e) => {
                console.log('音频加载失败:', e);
            });
        }

        function toggleMusic() {
            if (isPlaying) {
                bgAudio.pause();
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                bgAudio.play().then(() => {
                    musicBtn.textContent = '⏸️';
                    musicBtn.classList.add('playing');
                    isPlaying = true;
                }).catch(e => {
                    console.log('播放失败:', e);
                });
            }
        }

        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });

        function updateMusicInfo() {
            musicInfo.textContent = musicList[currentMusicIndex].name;
        }

        // ========== 事件处理 ==========

        // 触摸事件（优化多点触控）
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudioContext();
            
            for (let touch of e.touches) {
                createAlgaeCluster(touch.clientX, touch.clientY);
                playPianoNote();
            }
        }, { passive: false });

        canvas.addEventListener('click', (e) => {
            initAudioContext();
            createAlgaeCluster(e.clientX, e.clientY);
            playPianoNote();
        });

        document.addEventListener('keydown', (e) => {
            initAudioContext();
            const x = Math.random() * window.innerWidth * 0.8 + window.innerWidth * 0.1;
            const y = window.innerHeight * 0.5 + Math.random() * window.innerHeight * 0.3;
            createAlgaeCluster(x, y);
            playPianoNote();
        });

        canvas.addEventListener('mousedown', (e) => {
            initAudioContext();
            createAlgaeCluster(e.clientX, e.clientY);
            playPianoNote();
        });

        // ========== 初始化 ==========

        startBtn.addEventListener('click', () => {
            initAudioContext();
            initBackgroundMusic();
            updateMusicInfo();
            initBackgroundParticles();
            
            loading.classList.add('hidden');
            startBtn.classList.add('hidden');
            
            toggleMusic();
            animate();
            
            // 初始创建一些蓝藻
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const x = Math.random() * window.innerWidth * 0.8 + window.innerWidth * 0.1;
                        const y = window.innerHeight * 0.7 + Math.random() * window.innerHeight * 0.2;
                        createAlgaeCluster(x, y);
                    }, i * 300);
                }
            }, 500);
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                loading.classList.add('hidden');
            }, 1000);
        });

        // 性能优化 - 限制团块数量
        const MAX_CLUSTERS = 150;
        setInterval(() => {
            if (algaeClusters.length > MAX_CLUSTERS) {
                algaeClusters.splice(0, algaeClusters.length - MAX_CLUSTERS);
            }
        }, 500);

        // 页面可见性变化
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (isPlaying) bgAudio.pause();
            } else {
                if (isPlaying) bgAudio.play().catch(e => console.log(e));
            }
        });
    </script>
</body>
</html>
